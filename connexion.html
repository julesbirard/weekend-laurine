<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion</title>
  <link rel="stylesheet" href="css/style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Quicksand:wght@500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/connexion.css">
</head>
<body class="page-centree connexion">

  <svg style="display:none" aria-hidden="true">
    <symbol id="ic-avion" viewBox="0 0 100 100">
      <path d="M10,55 L85,30 L60,50 L70,80 L55,68 L45,78 L42,58 Z" fill="var(--marine)" />
    </symbol>
  </svg>

  <div class="zone-carte">
    <svg class="sticker-billet"><use href="#ic-avion" /></svg>

    <div id="etape-code" class="carte-connexion">
      <h1>Entre ton code d'accès</h1>
      <input type="text" id="code" placeholder="Indique ton code super méga secret">
      <button onclick="seConnecter()">Enter the adventure</button>
      <p id="message" class="message"></p>
    </div>

    <!-- Ce formulaire est masqué par défaut (style="display: none").
         Le JavaScript ci-dessous l'affichera uniquement si profil_complete = false -->
    <div id="etape-profil" class="carte-connexion" style="display: none;">
      <h1>Complète ton profil</h1>
      <input type="text" id="nom" placeholder="Nom">
      <input type="text" id="prenom" placeholder="Prénom">
      <input type="text" id="surnom" placeholder="Surnom">
      <input type="email" id="email" placeholder="Email">
      <button onclick="validerProfil()">Valider mon profil</button>
      <p id="message-profil" class="message"></p>
    </div>
  </div>

  <!-- On importe la bibliothèque Supabase, qui fournit les outils prêts à l'emploi
       pour dialoguer avec notre base de données depuis le navigateur -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/connexion.js"></script>

</body>
</html>
