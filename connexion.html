<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Connexion</title>
  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Quicksand:wght@500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --creme: #fbf3e6;
      --encre: #2b2118;
      --teal: #2f6f62;
      --corail: #c9503f;
      --moutarde: #e3a73c;
      --marine: #2d3e63;
      --bois: #8b5e3c;
    }

    body.connexion {
      background-color: var(--creme);
      font-family: 'Quicksand', sans-serif;
      color: var(--encre);
    }

    .zone-carte {
      position: relative;
      width: 100%;
      max-width: 480px;
      padding-top: 1rem;
    }

    .sticker-billet {
      position: absolute;
      top: -0.8rem;
      left: -1rem;
      width: 50px;
      transform: rotate(-15deg);
      filter: drop-shadow(0 3px 4px rgba(43, 33, 24, 0.15));
      z-index: 2;
    }

    @media (max-width: 420px) {
      .sticker-billet { display: none; }
      .carte-connexion input { font-size: 0.95rem; }
    }

    .carte-connexion {
      background-color: #fffdf8;
      border-radius: 20px;
      box-shadow: 0 8px 24px rgba(43, 33, 24, 0.1);
      padding: 2.4rem 2.2rem;
      text-align: center;
    }

    .carte-connexion h1 {
      font-size: 1.6rem;
      font-weight: 800;
      margin: 0 0 1.4rem 0;
      color: var(--encre);
    }

    .carte-connexion input {
      display: block;
      width: 100%;
      max-width: 100%;
      font-family: 'Quicksand', sans-serif;
      font-size: 1.1rem;
      font-weight: 600;
      padding: 0.85rem 1.2rem;
      border: 2px solid var(--marine);
      border-radius: 999px;
      text-align: center;
      margin: 0 0 0.9rem 0;
      color: var(--encre);
      background-color: var(--creme);
      box-sizing: border-box;
    }

    .carte-connexion input::placeholder {
      color: #9a8f7e;
      font-style: italic;
      font-size: 0.85rem;
    }

    .carte-connexion button {
      font-family: 'Quicksand', sans-serif;
      font-weight: 700;
      font-size: 1.05rem;
      padding: 0.75rem 2rem;
      border: none;
      border-radius: 999px;
      background-color: var(--corail);
      color: white;
      cursor: pointer;
      box-shadow: 0 6px 16px rgba(201, 80, 63, 0.3);
      transition: background-color 0.2s ease, transform 0.15s ease;
    }

    .carte-connexion button:hover {
      background-color: #b5432f;
      transform: translateY(-2px);
    }

    .message {
      margin-top: 1rem;
      font-weight: 600;
    }
  </style>
</head>
<body class="page-centree connexion">

  <svg style="display:none" aria-hidden="true">
    <symbol id="ic-avion" viewBox="0 0 100 100">
      <path d="M10,55 L85,30 L60,50 L70,80 L55,68 L45,78 L42,58 Z" fill="var(--marine)" />
    </symbol>
  </svg>

  <div class="zone-carte">
    <svg class="sticker-billet"><use href="#ic-avion" /></svg>

    <div id="etape-code" class="carte-connexion">
      <h1>Entre ton code d'accès</h1>
      <input type="text" id="code" placeholder="Indique ton code super méga secret">
      <button onclick="seConnecter()">Enter the adventure</button>
      <p id="message" class="message"></p>
    </div>

    <!-- Ce formulaire est masqué par défaut (style="display: none").
         Le JavaScript ci-dessous l'affichera uniquement si profil_complete = false -->
    <div id="etape-profil" class="carte-connexion" style="display: none;">
      <h1>Complète ton profil</h1>
      <input type="text" id="nom" placeholder="Nom">
      <input type="text" id="prenom" placeholder="Prénom">
      <input type="text" id="surnom" placeholder="Surnom">
      <input type="email" id="email" placeholder="Email">
      <button onclick="validerProfil()">Valider mon profil</button>
      <p id="message-profil" class="message"></p>
    </div>
  </div>

  <!-- On importe la bibliothèque Supabase, qui fournit les outils prêts à l'emploi
       pour dialoguer avec notre base de données depuis le navigateur -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // ⚠️ Remplace ces deux valeurs par celles récupérées à l'étape 2
    // (Settings > Data API dans Supabase)
    const SUPABASE_URL = 'https://fsrjhdxbdpdrdlcovdxg.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_7pg8_ejZTCj1D6dcnuLsSw_Kq4dpuxX';

    // On crée un "client" Supabase : l'objet qui va nous permettre de
    // communiquer avec notre base de données.
    // Note : on l'appelle "supabaseClient" et non "supabase", car la bibliothèque
    // importée juste au-dessus utilise déjà ce nom pour elle-même.
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function seConnecter() {
      const messageEl = document.getElementById('message');
      const code = document.getElementById('code').value.trim();

      if (code === '') {
        messageEl.textContent = 'Merci de saisir un code.';
        messageEl.className = 'erreur';
        return;
      }

      messageEl.textContent = 'Vérification...';
      messageEl.className = '';

      // On appelle notre fonction "verifier_code" créée dans Supabase,
      // en lui passant le code saisi par l'invité
      const { data, error } = await supabaseClient.rpc('verifier_code', { code_saisi: code });

      if (error) {
        // Une erreur technique (connexion, faute dans le nom de la fonction, etc.)
        console.error(error);
        messageEl.textContent = "Une erreur est survenue, réessaie.";
        messageEl.className = 'erreur';
        return;
      }

      if (data.length === 0) {
        // La fonction n'a renvoyé aucune ligne : le code n'existe pas
        messageEl.textContent = 'Code invalide.';
        messageEl.className = 'erreur';
        return;
      }

      // Le code est valide : on récupère les infos de l'invité (une seule ligne)
      const invite = data[0];
      console.log('Invité trouvé :', invite);

      if (invite.profil_complete === false) {
        // Premier login : on cache l'étape "code" et on affiche le formulaire de profil.
        // On garde le code en mémoire (dans une variable globale) pour pouvoir
        // l'envoyer à nouveau quand l'invité validera son profil.
        codeInviteActuel = code;
        document.getElementById('etape-code').style.display = 'none';
        document.getElementById('etape-profil').style.display = 'block';
      } else {
        // Profil déjà complet : on stocke le code et le surnom pour la page suivante,
        // puis on redirige vers la page personnelle
        sessionStorage.setItem('code', code);
        sessionStorage.setItem('prenom', invite.prenom);
        window.location.href = 'dashboard-test.html';
      }
    }

    // Variable qui garde en mémoire le code de l'invité entre l'étape 1 (connexion)
    // et l'étape 2 (complétion du profil)
    let codeInviteActuel = null;

    async function validerProfil() {
      const messageEl = document.getElementById('message-profil');

      const nom = document.getElementById('nom').value.trim();
      const prenom = document.getElementById('prenom').value.trim();
      const surnom = document.getElementById('surnom').value.trim();
      const email = document.getElementById('email').value.trim();

      if (nom === '' || prenom === '' || email === '') {
        messageEl.textContent = 'Merci de remplir au moins Nom, Prénom et Email.';
        messageEl.className = 'erreur';
        return;
      }

      messageEl.textContent = 'Enregistrement...';
      messageEl.className = '';

      // On appelle notre fonction "completer_profil", qui met à jour la ligne
      // correspondant à codeInviteActuel, et marque le profil comme complet
      const { data, error } = await supabaseClient.rpc('completer_profil', {
        code_saisi: codeInviteActuel,
        nom_saisi: nom,
        prenom_saisi: prenom,
        surnom_saisi: surnom,
        email_saisi: email
      });

      if (error) {
        console.error(error);
        messageEl.textContent = "Une erreur est survenue, réessaie.";
        messageEl.className = 'erreur';
        return;
      }

      messageEl.textContent = 'Profil enregistré, merci !';
      messageEl.className = 'succes';

      // On stocke le code et le surnom, puis on redirige vers la page personnelle
      sessionStorage.setItem('code', codeInviteActuel);
      sessionStorage.setItem('prenom', prenom);
      setTimeout(() => { window.location.href = 'dashboard-test.html'; }, 800);
    }
  </script>

</body>
</html>
