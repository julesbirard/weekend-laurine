<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Le week-end approche...</title>
  <link rel="stylesheet" href="css/style.css">

  <!-- Polices : Caveat (manuscrite, pour l'accroche) + Quicksand (ronde, pour le reste) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/index.css">
</head>
<body class="page-centree teaser">

  <!-- Élément signature : un moulin à eau, clin d'œil au Moulin des Ducs -->
  <svg class="moulin-illustration" viewBox="0 0 400 280" aria-hidden="true">

    <!-- Arbre, à gauche : tronc + houppier arrondi (3 masses rondes superposées) -->
    <line x1="60" y1="212" x2="60" y2="98" stroke="var(--bois)" stroke-width="4" stroke-linecap="round" />
    <ellipse cx="60" cy="100" rx="27" ry="24" fill="var(--vert-sauge)" />
    <ellipse cx="42" cy="118" rx="20" ry="18" fill="var(--vert-sauge)" />
    <ellipse cx="78" cy="120" rx="20" ry="18" fill="var(--vert-sauge)" />

    <!-- Toit -->
    <polygon points="280,52 208,92 352,92" fill="var(--toit)" />

    <!-- Bâtiment en pierre -->
    <rect x="220" y="92" width="120" height="118" fill="var(--pierre)" stroke="var(--encre)" stroke-width="2" />

    <!-- Fenêtres, régulièrement espacées -->
    <rect x="243" y="128" width="28" height="28" fill="#fdf9f0" stroke="var(--corail)" stroke-width="3" />
    <rect x="289" y="128" width="28" height="28" fill="#fdf9f0" stroke="var(--corail)" stroke-width="3" />

    <!-- Poutre reliant la roue au bâtiment, pour bien les connecter visuellement -->
    <line x1="170" y1="195" x2="220" y2="195" stroke="var(--bois)" stroke-width="6" stroke-linecap="round" />

    <!-- Roue à aubes, tourne en continu -->
    <g class="roue-aubes">
      <circle cx="170" cy="195" r="40" fill="none" stroke="var(--bois)" stroke-width="4" />
      <g stroke="var(--bois)" stroke-width="5" stroke-linecap="round">
        <line x1="170" y1="195" x2="170" y2="159" transform="rotate(0 170 195)" />
        <line x1="170" y1="195" x2="170" y2="159" transform="rotate(45 170 195)" />
        <line x1="170" y1="195" x2="170" y2="159" transform="rotate(90 170 195)" />
        <line x1="170" y1="195" x2="170" y2="159" transform="rotate(135 170 195)" />
        <line x1="170" y1="195" x2="170" y2="159" transform="rotate(180 170 195)" />
        <line x1="170" y1="195" x2="170" y2="159" transform="rotate(225 170 195)" />
        <line x1="170" y1="195" x2="170" y2="159" transform="rotate(270 170 195)" />
        <line x1="170" y1="195" x2="170" y2="159" transform="rotate(315 170 195)" />
      </g>
      <circle cx="170" cy="195" r="9" fill="var(--encre)" />
    </g>

    <!-- Cours d'eau -->
    <path d="M0,222 Q60,212 120,220 T240,222 T400,214 L400,280 L0,280 Z" fill="var(--bleu-eau)" />
    <path class="flux-eau" d="M20,232 Q80,225 140,232 T260,233 T380,227" fill="none" stroke="#dcecf2" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="10 10" />
    <path class="flux-eau" d="M10,250 Q70,244 130,250 T250,251 T390,246" fill="none" stroke="#dcecf2" stroke-width="2" stroke-linecap="round" stroke-dasharray="8 12" />

    <!-- Petits galets, à moitié immergés -->
    <ellipse cx="215" cy="238" rx="13" ry="6" fill="#cdbfa0" stroke="var(--encre)" stroke-width="1" />
    <ellipse cx="320" cy="244" rx="15" ry="7" fill="#cdbfa0" stroke="var(--encre)" stroke-width="1" />

    <!-- Touffes d'herbe, réparties le long de la rive -->
    <g stroke="var(--vert-sauge)" stroke-width="2.5" stroke-linecap="round" fill="none">
      <path d="M30,222 q3,-11 0,-18" />
      <path d="M38,222 q5,-9 2,-16" />
      <path d="M22,222 q-3,-9 -1,-15" />

      <path d="M100,220 q3,-11 0,-18" />
      <path d="M108,220 q5,-9 2,-16" />

      <path d="M195,220 q3,-10 0,-17" />
      <path d="M203,220 q4,-8 2,-15" />
      <path d="M187,220 q-3,-9 -1,-15" />

      <path d="M355,206 q3,-11 0,-18" />
      <path d="M363,206 q5,-9 2,-16" />
      <path d="M347,206 q-3,-9 -1,-15" />

      <path d="M355,224 q3,-9 0,-15" />
      <path d="M363,224 q4,-7 2,-13" />
    </g>
  </svg>

  <p class="accroche">Quelque chose de mémorable se prépare...</p>

  <div class="carte-billet">
    <div class="billet-entete">DÉBUT DE L'AVENTURE</div>
    <div class="perforation perforation-gauche"></div>
    <div class="perforation perforation-droite"></div>

    <div id="countdown">
      <div class="bloc-temps">
        <div class="valeur" id="jours">0</div>
        <div class="label">JOURS</div>
      </div>
      <div class="bloc-temps">
        <div class="valeur" id="heures">0</div>
        <div class="label">HEURES</div>
      </div>
      <div class="bloc-temps">
        <div class="valeur" id="minutes">0</div>
        <div class="label">MIN</div>
      </div>
      <div class="bloc-temps">
        <div class="valeur" id="secondes">0</div>
        <div class="label">SEC</div>
      </div>
    </div>
  </div>

  <script src="js/countdown.js"></script>
  <script src="js/waiting-page.js"></script>

</body>
</html>
