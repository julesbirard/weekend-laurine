<!DOCTYPE html>
<!-- Cette première ligne dit au navigateur : "ce fichier est écrit en HTML moderne" -->
<html lang="fr">
<head>
  <!-- Le <head> contient des informations qui ne s'affichent pas directement à l'écran -->
  <meta charset="UTF-8">
  <!-- charset="UTF-8" permet d'afficher correctement les accents français -->
  <title>Site du week-end</title>
  <!-- Le titre qui apparaît dans l'onglet du navigateur -->
</head>
<body>
  <!-- Le <body> contient tout ce qui s'affiche réellement à l'écran -->
  <h1>Ça marche !</h1>
  <p>Le site du week-end est en cours de construction.</p>
</body>
</html>
